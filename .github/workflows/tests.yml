name: Tests du moteur

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Installer les dependances
        run: flutter pub get

      - name: Verifier tout le code
        run: flutter analyze

      - name: Lancer les tests
        run: flutter test
